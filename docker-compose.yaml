version: '3.8'

services:
  node-app:
    build:
      context: .
      dockerfile: DockerFile
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    deploy:
      replicas: 2
    networks:
      - backend

  nginx-lb:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-app
      - redis
    networks:
      - backend

  redis:
    image: redis:alpine
    networks:
      - backend

networks:
  backend:
    driver: bridge
